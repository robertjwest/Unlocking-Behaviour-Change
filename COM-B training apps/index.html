<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlocking Behaviour Change — Course Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ede6;
    --surface: #ffffff;
    --ink: #1c1c1c;
    --ink-light: #5a5a5a;
    --border: #d6d0c4;
    --accent: #2c5f8a;
    --accent-dark: #1e4166;
    --accent-light: #e8f0f7;
    --green: #2d6a4f;
    --green-light: #e8f4ef;
    --shadow: rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 5rem;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 27px, rgba(180,160,120,0.1) 28px
    );
  }

  .container {
    width: 100%;
    max-width: 700px;
  }

  header {
    border-top: 4px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    padding: 1.5rem 0;
    margin-bottom: 2.5rem;
  }

  .org-label {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.6rem;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 600;
    line-height: 1.2;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .tagline {
    margin-top: 0.6rem;
    font-size: 0.95rem;
    color: var(--ink-light);
    line-height: 1.6;
  }

  .section-label {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .apps-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .app-card {
    display: flex;
    align-items: stretch;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 3px;
    box-shadow: 2px 2px 0 var(--border);
    text-decoration: none;
    color: var(--ink);
    transition: all 0.15s ease;
    overflow: hidden;
  }

  .app-card:hover {
    border-color: var(--accent);
    box-shadow: 3px 3px 0 var(--accent-light);
    transform: translateY(-1px);
  }

  .app-card:hover .card-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  .card-type {
    width: 5px;
    flex-shrink: 0;
  }

  .card-type.quiz { background: var(--green); }
  .card-type.form { background: var(--accent); }

  .card-body {
    flex: 1;
    padding: 1.2rem 1.4rem;
  }

  .card-meta {
    margin-bottom: 0.4rem;
  }

  .card-tag {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    font-weight: 500;
  }

  .tag-quiz {
    background: var(--green-light);
    color: var(--green);
  }

  .tag-form {
    background: var(--accent-light);
    color: var(--accent-dark);
  }

  .card-title {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 0.3rem;
    margin-top: 0.4rem;
  }

  .card-desc {
    font-size: 0.87rem;
    color: var(--ink-light);
    line-height: 1.55;
  }

  .card-arrow {
    display: flex;
    align-items: center;
    padding: 0 1.2rem;
    font-size: 1.2rem;
    color: var(--border);
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .loading {
    text-align: center;
    padding: 2rem;
    color: var(--ink-light);
    font-size: 0.9rem;
    font-style: italic;
    font-family: 'Lora', serif;
  }

  .error {
    padding: 1rem;
    background: #fdf0ec;
    border: 1px solid #f0c4b4;
    border-radius: 3px;
    color: #8a4a2c;
    font-size: 0.88rem;
    line-height: 1.6;
  }

  footer {
    border-top: 1px solid var(--border);
    padding-top: 1.2rem;
    font-size: 0.82rem;
    color: var(--ink-light);
    text-align: center;
    line-height: 1.7;
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
  }

  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <header>
    <p class="org-label">Unlocking Behaviour Change CIC</p>
    <h1>Course <em>Apps</em></h1>
    <p class="tagline">Interactive tools to support training in behaviour change science.</p>
  </header>

  <p class="section-label">Available apps</p>
  <div class="apps-grid" id="apps-grid">
    <div class="loading">Loading apps…</div>
  </div>

  <footer>
    <p>Unlocking Behaviour Change CIC &nbsp;·&nbsp;
      <a href="https://www.unlockingbehaviourchange.com" target="_blank">unlockingbehaviourchange.com</a>
    </p>
  </footer>

</div>

<script>
  async function loadApps() {
    const grid = document.getElementById('apps-grid');

    try {
      const resp = await fetch('apps.json');
      if (!resp.ok) throw new Error('Could not load apps.json');
      const apps = await resp.json();

      if (apps.length === 0) {
        grid.innerHTML = '<div class="loading">No apps available yet.</div>';
        return;
      }

      grid.innerHTML = '';
      apps.forEach(app => {
        const type = app.type || 'form';
        const tagClass = type === 'quiz' ? 'tag-quiz' : 'tag-form';
        const tagLabel = type.charAt(0).toUpperCase() + type.slice(1);

        const card = document.createElement('a');
        card.className = 'app-card';
        card.href = app.filename;
        card.innerHTML = `
          <div class="card-type ${type}"></div>
          <div class="card-body">
            <div class="card-meta">
              <span class="card-tag ${tagClass}">${tagLabel}</span>
            </div>
            <p class="card-title">${app.title}</p>
            <p class="card-desc">${app.description}</p>
          </div>
          <div class="card-arrow">→</div>
        `;
        grid.appendChild(card);
      });

    } catch(err) {
      grid.innerHTML = `<div class="error">
        <strong>Could not load the app list.</strong><br>
        Make sure <code>apps.json</code> is in the same folder as this file.
      </div>`;
    }
  }

  loadApps();
</script>

</body>
</html>
